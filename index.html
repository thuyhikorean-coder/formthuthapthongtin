<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tư Vấn Du Học Hàn Quốc | Hikorean</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header class="form-header">
            <img src="logo.jpg" alt="Hikorean Form Logo" class="brand-logo">
            <h1 class="logo-title">HIKOREAN</h1>
            <h2>Hồ Sơ Năng Lực Du Học Hàn Quốc</h2>
            <p>Điền đủ và chính xác thông tin để hồ sơ được xét duyệt nhanh chóng và cam kết tỷ lệ đỗ Visa cao nhất từ Hikorean.</p>
        </header>

        <form id="duHocForm" class="glass-form" autocomplete="off">
            <!-- PHẦN 1: THÔNG TIN CÁ NHÂN -->
            <h3 class="section-title">I. THÔNG TIN CÁ NHÂN</h3>
            
            <div class="form-row">
                <div class="form-group half-width">
                    <label>Họ và Tên <span class="required">*</span></label>
                    <input type="text" name="fullName" placeholder="VD: Vũ Tâm Như" required>
                </div>
                <div class="form-group half-width">
                    <label>Giới tính <span class="required">*</span></label>
                    <select name="gender" required>
                        <option value="" disabled selected>Chọn giới tính</option>
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group half-width">
                    <label>Ngày sinh <span class="required">*</span></label>
                    <input type="date" name="dob" required>
                </div>
                <div class="form-group half-width">
                    <label>Nơi sinh <span class="required">*</span></label>
                    <input type="text" name="birthplace" placeholder="VD: Thái Bình" required>
                </div>
            </div>

            <div class="form-group">
                <label>Địa chỉ (Chi tiết thôn, xóm...) <span class="required">*</span></label>
                <input type="text" name="address" placeholder="VD: Tổ 6, TT. An Bài, Quỳnh Phụ..." required>
            </div>

            <div class="form-row">
                <div class="form-group half-width">
                    <label>Điện thoại di động <span class="required">*</span></label>
                    <input type="tel" name="phoneMobile" placeholder="VD: 0987xxx..." required>
                </div>
                <div class="form-group half-width">
                    <label>Email Cá nhân</label>
                    <input type="email" name="email" placeholder="VD: email@gmail.com">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group third-width">
                    <label>Số Hộ Chiếu</label>
                    <input type="text" name="passportNo" placeholder="P0384...">
                </div>
                <div class="form-group third-width">
                    <label>Ngày cấp HC</label>
                    <input type="date" name="passportDate">
                </div>
                <div class="form-group third-width">
                    <label>Hết hạn HC</label>
                    <input type="date" name="passportExp">
                </div>
            </div>

            <!-- PHẦN 2: LỊCH SỬ HỌC TẬP -->
            <h3 class="section-title">II. LỊCH SỬ HỌC TẬP</h3>

            <div class="form-row">
                <div class="form-group half-width">
                    <label>Bậc học cao nhất <span class="required">*</span></label>
                    <select name="highestEdu" required>
                        <option value="" disabled selected>Chọn</option>
                        <option value="THPT">Tốt nghiệp THPT (Cấp 3)</option>
                        <option value="Sinh viên ĐH/CĐ">Đang là Sinh viên ĐH/CĐ</option>
                        <option value="Đã tốt nghiệp ĐH/CĐ">Đã Tốt nghiệp ĐH/CĐ</option>
                        <option value="Thạc sĩ">Thạc sĩ</option>
                    </select>
                </div>
                <div class="form-group half-width">
                    <label>Năm tốt nghiệp <span class="required">*</span></label>
                    <input type="text" name="gradYear" placeholder="VD: 2024" required>
                </div>
            </div>

            <label style="margin-bottom:1rem;color:var(--primary-dark);font-weight:700">➜ TRƯỜNG THPT (Cấp 3)</label>
            <div class="form-row">
                <div class="form-group half-width">
                    <label>Tên trường THPT <span class="required">*</span></label>
                    <input type="text" name="hsName" placeholder="VD: THPT Phụ Dực" required>
                </div>
                <div class="form-group half-width">
                    <label>SĐT Trường THPT</label>
                    <input type="tel" name="hsPhone" placeholder="SĐT liên hệ nhà trường...">
                </div>
            </div>
            
            <div class="form-group">
                <label>Địa chỉ trường THPT <span class="required">*</span></label>
                <input type="text" name="hsAddress" placeholder="Chi tiết địa chỉ trường..." required>
            </div>

            <div class="form-row">
                <div class="form-group third-width">
                    <label>Điểm Lớp 10 <span class="required">*</span></label>
                    <input type="text" name="gpa10" placeholder="VD: 8.7" required>
                </div>
                <div class="form-group third-width">
                    <label>Điểm Lớp 11 <span class="required">*</span></label>
                    <input type="text" name="gpa11" placeholder="VD: 9.0" required>
                </div>
                <div class="form-group third-width">
                    <label>Điểm Lớp 12 <span class="required">*</span></label>
                    <input type="text" name="gpa12" placeholder="VD: 8.9" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group third-width">
                    <label>Điểm danh vắng 10</label>
                    <input type="number" name="absent10" placeholder="Số buổi" value="0">
                </div>
                <div class="form-group third-width">
                    <label>Điểm danh vắng 11</label>
                    <input type="number" name="absent11" placeholder="Số buổi" value="0">
                </div>
                <div class="form-group third-width">
                    <label>Điểm danh vắng 12</label>
                    <input type="number" name="absent12" placeholder="Số buổi" value="0">
                </div>
            </div>

            <label style="margin-top:1rem;margin-bottom:1rem;color:var(--primary-dark);font-weight:700">➜ BẬC ĐẠI HỌC / CAO ĐẲNG (Nếu có, không có thì bỏ qua)</label>
            <div class="form-row">
                <div class="form-group half-width">
                    <label>Trường ĐH/CĐ</label>
                    <input type="text" name="uniName" placeholder="Tên trường ĐH...">
                </div>
                <div class="form-group half-width">
                    <label>Chuyên ngành</label>
                    <input type="text" name="uniMajor" placeholder="Chuyên ngành...">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group third-width">
                    <label>GPA Đại học</label>
                    <input type="text" name="uniGpa" placeholder="Điểm hệ 4 hoặc 10">
                </div>
                <div class="form-group third-width">
                    <label>SĐT Trường ĐH</label>
                    <input type="tel" name="uniPhone" placeholder="SĐT trường...">
                </div>
                <div class="form-group third-width">
                    <label>Email Trường ĐH</label>
                    <input type="email" name="uniEmail" placeholder="Email...">
                </div>
            </div>


            <!-- PHẦN 3: GIA ĐÌNH VÀ TÀI CHÍNH -->
            <h3 class="section-title">III. GIA ĐÌNH VÀ TÀI CHÍNH</h3>
            <div class="form-group">
                <label>Tổng số người trong gia đình <span class="required">*</span></label>
                <input type="number" name="familyCount" placeholder="VD: 4" required>
            </div>

            <div class="form-row">
                <div class="form-group third-width">
                    <label>Họ tên Bố <span class="required">*</span></label>
                    <input type="text" name="dadName" required>
                </div>
                <div class="form-group third-width">
                    <label>Nghề nghiệp Bố</label>
                    <input type="text" name="dadJob">
                </div>
                <div class="form-group third-width">
                    <label>SĐT Bố</label>
                    <input type="tel" name="dadPhone">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group third-width">
                    <label>Họ tên Mẹ <span class="required">*</span></label>
                    <input type="text" name="momName" required>
                </div>
                <div class="form-group third-width">
                    <label>Nghề nghiệp Mẹ</label>
                    <input type="text" name="momJob">
                </div>
                <div class="form-group third-width">
                    <label>SĐT Mẹ</label>
                    <input type="tel" name="momPhone">
                </div>
            </div>

            <div class="form-group">
                <label>Gia đình có sở hữu nhà, đất đai không? <span class="required">*</span></label>
                <textarea name="realEstate" rows="2" placeholder="Mô tả số lượng nhà, đất đai, có sổ đỏ không..." required></textarea>
            </div>
            <div class="form-group">
                <label>Tài sản khác (Kinh doanh, cửa hàng, xe cộ, dãy trọ...) <span class="required">*</span></label>
                <textarea name="otherAssets" rows="2" placeholder="Ghi rõ các nguồn doanh thu hoặc tài sản giá trị khác của gia đình..." required></textarea>
            </div>

            <!-- PHẦN 4: THÔNG TIN XUẤT CẢNH VÀ DU HỌC -->
            <h3 class="section-title">IV. LƯU TRÚ & ĐỊNH HƯỚNG DU HỌC</h3>
            
            <div class="form-group">
                <label>Người nhà/người quen đang ở Hàn Quốc (nếu có)</label>
                <input type="text" name="relativesKr" placeholder="VD: Chị gái (Đang làm hợp pháp) hoặc 'Không có'">
            </div>
            
            <div class="form-group">
                <label>Trong họ hàng có ai từng cư trú Bất Hợp Pháp tại Hàn không?</label>
                <input type="text" name="bhpKr" placeholder="VD: Có chú ruột (đã về) hoặc 'Không có'">
            </div>

            <div class="form-group">
                <label>Trình độ tiếng Hàn hiện tại của bạn <span class="required">*</span></label>
                <input type="text" name="koreanLevel" placeholder="Học được bao lâu, Topik mấy..." required>
            </div>

            <div class="form-row">
                <div class="form-group half-width">
                    <label>Hệ dự định / Visa mong muốn <span class="required">*</span></label>
                    <select name="studySystem" required>
                        <option value="" disabled selected>Chọn hệ dự định du học</option>
                        <option value="Hệ học tiếng (D4-1)">Hệ học tiếng (D4-1)</option>
                        <option value="Hệ Đại học (D2-2)">Hệ Đại học (D2-2)</option>
                        <option value="Hệ Thạc sĩ (D2-3)">Hệ Thạc sĩ (D2-3)</option>
                        <option value="Khác">Chưa rõ định hướng</option>
                    </select>
                </div>
                <div class="form-group half-width">
                    <label>Trường HQ mục tiêu (nếu có)</label>
                    <input type="text" name="krUni" placeholder="VD: Yonsei, DongA...">
                </div>
            </div>

            <div class="form-group">
                <label>Ghi chú khác</label>
                <textarea name="note" rows="2" placeholder="Khu vực mong muốn, vấn đề hồ sơ..."></textarea>
            </div>

            <div class="form-actions" style="margin-top:2rem">
                <button type="submit" id="submitBtn" class="btn-submit">
                    <span class="btn-text">Gửi Yêu Cầu Tư Vấn</span>
                    <div class="loader-spinner"></div>
                </button>
            </div>
            <div id="statusMessage" class="status-message"></div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
