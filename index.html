<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tư Vấn Du Học Hàn Quốc | Hikorean</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header class="form-header">
            <img src="logo.jpg" alt="Hikorean Form Logo" class="brand-logo">
            <h1 class="logo-title">HIKOREAN</h1>
            <h2>Hồ Sơ Năng Lực Du Học Hàn Quốc 2026</h2>
            <p>Điền đủ thông tin để nhận lộ trình du học chuyên biệt và cam kết tỷ lệ đỗ Visa cao nhất từ chuyên gia Hikorean.</p>
        </header>

        <form id="duHocForm" class="glass-form" autocomplete="off">
            <div class="form-group">
                <label for="fullName">1. Họ và tên của em <span class="required">*</span></label>
                <input type="text" id="fullName" name="fullName" placeholder="VD: Nguyễn Văn A" required>
            </div>

            <div class="form-group">
                <label for="phone">2. Số điện thoại (Zalo) liên hệ <span class="required">*</span></label>
                <input type="tel" id="phone" name="phone" placeholder="VD: 0987xxx..." required>
            </div>

            <div class="form-group">
                <label for="education">3. Năm sinh & Bậc học cao nhất đã/sẽ tốt nghiệp <span class="required">*</span></label>
                <input type="text" id="education" name="education" placeholder="VD: Sinh năm 2005 - Tốt nghiệp THPT 2023" required>
            </div>

            <div class="form-group">
                <label for="gpa">4. Điểm trung bình (GPA) các năm <span class="required">*</span></label>
                <input type="text" id="gpa" name="gpa" placeholder="VD: Lớp 10: 7.5, Lớp 11: 8.0, Lớp 12: 8.1" required>
            </div>

            <div class="form-group">
                <label for="hometown">5. Quê quán (Tỉnh/Thành phố theo hộ khẩu) <span class="required">*</span></label>
                <input type="text" id="hometown" name="hometown" placeholder="VD: Nghệ An, Hà Nội..." required>
            </div>

            <div class="form-group">
                <label>6. Em có người thân đang ở Hàn Quốc không? <span class="required">*</span></label>
                <div class="radio-group">
                    <label class="radio-card">
                        <input type="radio" name="relative" value="Không có ai" required>
                        <span class="radio-content">Không có ai</span>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="relative" value="Đang làm việc hợp pháp / Kết hôn">
                        <span class="radio-content">Có (Hợp pháp)</span>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="relative" value="Đang làm việc bất hợp pháp">
                        <span class="radio-content">Có (Bất hợp pháp)</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="parentsJob">7. Bố mẹ em đang làm công việc gì? Thu nhập hàng tháng của gia đình là bao nhiêu? <span class="required">*</span></label>
                <textarea id="parentsJob" name="parentsJob" rows="2" placeholder="VD: Bố mẹ làm nông nghiệp / kinh doanh, thu nhập khoảng 20tr/tháng..." required></textarea>
            </div>

            <div class="form-group">
                <label>8. Gia đình có sẵn sổ tiết kiệm ngân hàng (thường yêu cầu ~10,000 USD gửi tối thiểu 6 tháng) chưa, hay cần phía trung tâm hỗ trợ làm dịch vụ chứng minh ngoại hình/tài chính? <span class="required">*</span></label>
                <div class="radio-group" style="flex-direction: column;">
                    <label class="radio-card">
                        <input type="radio" name="bankBook" value="Đã có sổ tiết kiệm đủ điều kiện" required>
                        <span class="radio-content">Đã có sổ tiết kiệm gửi đủ số tháng</span>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="bankBook" value="Có tiền nhưng chưa lập sổ / chưa đủ thời gian">
                        <span class="radio-content">Có tài chính nhưng chưa đủ 6 tháng</span>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="bankBook" value="Cần trung tâm hỗ trợ dịch vụ chứng minh">
                        <span class="radio-content">Cần trung tâm hỗ trợ DV tài chính</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="finance">9. Mức tài chính gia đình có thể chuẩn bị ban đầu khoảng bao nhiêu? <span class="required">*</span></label>
                <select id="finance" name="finance" required>
                    <option value="" disabled selected>Chọn mức tài chính dự kiến</option>
                    <option value="Dưới 150 triệu">Dưới 150 triệu</option>
                    <option value="150 - 200 triệu">150 - 200 triệu</option>
                    <option value="200 - 300 triệu">200 - 300 triệu</option>
                    <option value="Mức khác / Chưa rõ">Mức khác / Chưa rõ</option>
                </select>
            </div>

            <div class="form-group">
                <label for="koreanLevel">10. Trình độ tiếng Hàn hiện tại của em là gì? <span class="required">*</span></label>
                <input type="text" id="koreanLevel" name="koreanLevel" placeholder="VD: Đang học sơ cấp 2, hoặc TOPIK 2" required>
            </div>

            <div class="form-group">
                <label for="studySystem">11. Em muốn học hệ tiếng (D4-1) hay Hệ đại học (D2-2), hay thạc sỹ (D2-3)? <span class="required">*</span></label>
                <select id="studySystem" name="studySystem" required>
                    <option value="" disabled selected>Chọn hệ dự định du học</option>
                    <option value="Hệ học tiếng (D4-1)">Hệ học tiếng (D4-1)</option>
                    <option value="Hệ Đại học (D2-2)">Hệ Đại học (D2-2)</option>
                    <option value="Hệ Thạc sĩ (D2-3)">Hệ Thạc sĩ (D2-3)</option>
                    <option value="Chưa rõ định hướng / Cần tư vấn thêm">Chưa rõ định hướng / Cần tư vấn</option>
                </select>
            </div>

            <div class="form-group">
                <label for="majorDesire">12. Nếu đi học tiếng, thì lên chuyên ngành em muốn học chuyên ngành gì? <span class="required">*</span></label>
                <input type="text" id="majorDesire" name="majorDesire" placeholder="VD: Truyền thông, Kinh doanh, Thẩm mỹ..." required>
            </div>

            <div class="form-group">
                <label for="desire">13. Nguyện vọng về khu vực học của em (Seoul, Busan...) <span class="required">*</span></label>
                <textarea id="desire" name="desire" rows="2" placeholder="Ví dụ: Em muốn học ở Seoul cho sầm uất, hoặc Busan cho dễ tìm việc làm..." required></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" id="submitBtn" class="btn-submit">
                    <span class="btn-text">Gửi Yêu Cầu Tư Vấn</span>
                    <div class="loader-spinner"></div>
                </button>
            </div>
            <div id="statusMessage" class="status-message"></div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
